# ============================================================
# Workflow CI/CD : Build et déploiement du mobile React Native
# Ce workflow s'exécute uniquement sur la branche main
#
# NOTE : React Native/Expo ne se build pas comme une app web.
# Pour un vrai build (APK/IPA), il faut utiliser EAS Build.
# Ce workflow fait une vérification complète du code.
# ============================================================
name: Build & Deploy Mobile

on:
  push:
    branches: [main]
  workflow_dispatch: # Permet de lancer manuellement depuis GitHub

concurrency:
  group: build-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────
  # Job 1 : Vérification complète du code mobile
  # ─────────────────────────────────────────────
  build-mobile:
    name: Vérification et validation mobile
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Installer les dépendances npm
        run: npm ci

      # Vérifier les types TypeScript avant de déployer
      - name: Vérifier les types TypeScript
        run: npm run type-check

      # Lancer les tests pour s'assurer que tout fonctionne
      - name: Lancer les tests Jest
        run: npm test -- --passWithNoTests

      # Exporter l'application web Expo (optionnel)
      # Décommenter si tu veux générer une version web de l'app
      # - name: Exporter l'app Expo (version web)
      #   run: npx expo export --platform web
      # - name: Sauvegarder l'export
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: mobile-web-export
      #     path: dist
      #     retention-days: 7

      - name: Résumé du build
        run: |
          echo "✅ Vérification TypeScript réussie"
          echo "✅ Tests Jest passés"
          echo "Pour un build APK/IPA, configure EAS Build : https://docs.expo.dev/build/introduction/"

  # ─────────────────────────────────────────────
  # Job 2 : Déploiement en staging
  # Se lance uniquement si la vérification a réussi
  # ─────────────────────────────────────────────
  deploy-mobile-staging:
    name: Déployer le mobile en staging
    needs: build-mobile
    runs-on: ubuntu-latest
    environment: staging

    steps:
      # TODO : Remplace ce bloc par ton vrai déploiement Expo/EAS
      # Exemple EAS Update (décommenter et ajouter le secret EXPO_TOKEN) :
      # - name: Installer EAS CLI
      #   run: npm install -g eas-cli
      # - name: Publier la mise à jour Expo
      #   run: eas update --branch staging --message "Deploy from CI"
      #   env:
      #     EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      - name: Déployer vers Expo
        run: |
          echo "✅ Étape de déploiement prête"
          echo "Ajoute ta commande EAS Update ou Expo Publish ici"
