# ============================================================
# Workflow CI : Tests de l'application mobile React Native
# Le code est à la RACINE du repo (pas dans un sous-dossier)
# ============================================================
name: Tests Mobile

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  mobile-tests:
    name: Tests Jest + Vérification TypeScript
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      # Installation de Node.js avec cache npm
      - name: Installer Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          # Le package-lock.json est à la racine du repo
          cache-dependency-path: package-lock.json

      - name: Installer les dépendances npm
        run: npm ci

      # Vérifier les types TypeScript
      # Le script "type-check" dans package.json exécute "tsc --noEmit"
      - name: Vérifier les types TypeScript
        run: npm run type-check

      # Lancer les tests Jest avec rapport de couverture
      # "--passWithNoTests" ne fait pas échouer s'il n'y a pas encore de tests
      - name: Lancer les tests Jest
        run: npm test -- --coverage --passWithNoTests

      # Sauvegarder le rapport de couverture comme artefact
      - name: Sauvegarder le rapport de couverture
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mobile-coverage
          path: coverage
          retention-days: 5
